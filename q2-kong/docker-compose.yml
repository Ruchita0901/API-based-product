version: "3.9"
services:
  record_label_api:
    image: python:3.12-slim
    restart: unless-stopped
    volumes:
      - ./:/app
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt && python main.py --service record_label_api --port 8002"
    ports:
      - "8002:8002"
    environment:
      - PYTHONUNBUFFERED=1

  book_service:
    image: python:3.12-slim
    restart: unless-stopped
    volumes:
      - ./:/app
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt && python main.py --service book_service --port 8003"
    ports:
      - "8003:8003"
    environment:
      - PYTHONUNBUFFERED=1

  kong:
    image: kong:3.4.0
    restart: unless-stopped
    depends_on:
      - record_label_api
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: ""
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    ports:
      - "8000:8000"
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
